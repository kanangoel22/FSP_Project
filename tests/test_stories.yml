#### Tests to evaluate that the bot behaves as expected.
#### https://rasa.com/docs/rasa/testing-your-assistant

stories:
- story: greet and get motivation quote
  steps:
  - user: |
      hello
    intent: greet
  - action: utter_greet
  - user: |
      i need some motivation
    intent: motivation
  - action: action_motivation_quote

- story: greet and get funny quote
  steps:
  - user: |
      hey there
    intent: greet
  - action: utter_greet
  - user: |
      tell me a joke
    intent: funny
  - action: action_funny_quote

- story: greet and get love quote then goodbye
  steps:
  - user: |
      hi
    intent: greet
  - action: utter_greet
  - user: |
      give me a love quote
    intent: love
  - action: action_love_quote
  - user: |
      bye
    intent: goodbye
  - action: utter_goodbye

- story: just say goodbye
  steps:
  - user: |
      see you later
    intent: goodbye
  - action: utter_goodbye

- story: ask for inspiration
  steps:
  - user: |
      inspire me
    intent: inspiration
  - action: action_inspiration_quote

- story: ask for success quote
  steps:
  - user: |
      how to be successful
    intent: success
  - action: action_success_quote
