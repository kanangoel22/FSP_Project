version: "3.1"

intents:
  - greet
  - motivation
  - inspiration
  - love
  - funny
  - success
  - goodbye
  - out_of_scope

responses:

  utter_greet:
  - text: "Hey there!  I'm your Quote Bot. Ask me for motivational, inspirational, love, funny, or success quotes!"
  - text: "Hello!  Want some quotes? Just tell me — motivation, inspiration, love, funny, or success!"
  - text: "Hi! I've got quotes for every mood. Try asking for a motivational or funny quote!"

  utter_goodbye:
  - text: "Goodbye!  Come back anytime you need a good quote!"
  - text: "See ya later! Hope the quotes brightened your day! "
  - text: "Bye! Remember — you're awesome. Come back for more quotes anytime!"

  utter_fallback:
  - text: "Hmm, I didn't quite get that  Try asking me for a motivational, inspirational, love, funny, or success quote!"
  - text: "Sorry, I'm not sure what you mean. I can share motivational, inspirational, love, funny, or success quotes — just ask!"

actions:
  - action_motivation_quote
  - action_inspiration_quote
  - action_funny_quote
  - action_love_quote
  - action_success_quote

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true