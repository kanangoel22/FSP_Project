version: "3.1"

intents:
  - greet
  - motivation
  - inspiration
  - love
  - funny
  - success
  - goodbye

responses:

  utter_greet:
  - text: "Hello! I can share motivational, inspirational, love, funny, or success quotes."

  utter_motivation:
  - text: "Believe you can and you're halfway there."

  utter_inspiration:
  - text: "The best way to predict the future is to create it."

  utter_love:
  - text: "Love all, trust a few, do wrong to none."

  utter_funny:
  - text: "I'm not lazy, I'm just on energy-saving mode."

  utter_success:
  - text: "Success usually comes to those who are too busy to be looking for it."

  utter_goodbye:
  - text: "Goodbye! Come back anytime if you want more quotes."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

  actions:
  - action_motivation_quote
  - action_inspiration_quote
  - action_funny_quote
  - action_love_quote
  - action_success_quote

  responses:
  utter_fallback:
  - text: "I'm sorry, I didn't understand that. You can ask me for motivational, inspirational, love, funny, or success quotes."