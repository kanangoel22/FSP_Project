version: "3.1"

rules:
  - rule: Say hello when user greets
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Say goodbye when user says goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Fetch motivation quote
    steps:
      - intent: motivation
      - action: action_motivation_quote

  - rule: Fetch inspiration quote
    steps:
      - intent: inspiration
      - action: action_inspiration_quote

  - rule: Fetch love quote
    steps:
      - intent: love
      - action: action_love_quote

  - rule: Fetch funny quote
    steps:
      - intent: funny
      - action: action_funny_quote

  - rule: Fetch success quote
    steps:
      - intent: success
      - action: action_success_quote

  - rule: Handle out of scope messages
    steps:
      - intent: out_of_scope
      - action: utter_fallback

  - rule: Ask the user to rephrase when not understood
    steps:
      - intent: nlu_fallback
      - action: utter_fallback